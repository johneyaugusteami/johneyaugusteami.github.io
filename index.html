<!DOCTYPE html>
<html lang="EN">

<Head>
    <Title>Johney's Portfolio</Title>
    <meta http-equiv="Content-Type" content="text/html;charset=UTF-8">
    <meta name="description" content="Johney Auguste Ami's Portfolio Website Front Page">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Simonetta&display=swap" rel="stylesheet">

    <style>
        body {
            background: rgb(131, 58, 180);
            background: -moz-linear-gradient(119deg, rgba(131, 58, 180, 1) 0%, rgba(253, 29, 29, 0.9136029411764706) 50%, rgba(252, 176, 69, 1) 100%);
            background: -webkit-linear-gradient(119deg, rgba(131, 58, 180, 1) 0%, rgba(253, 29, 29, 0.9136029411764706) 50%, rgba(252, 176, 69, 1) 100%);
            background: linear-gradient(119deg, rgba(131, 58, 180, 1) 0%, rgba(253, 29, 29, 0.9136029411764706) 50%, rgba(252, 176, 69, 1) 100%);
            filter: progid:DXImageTransform.Microsoft.gradient(startColorstr="#833ab4", endColorstr="#fcb045", GradientType=1);
            font-family: 'Simonetta', cursive;
        }

        h1 {
            display: block;
            align-content: center;
            text-align: center;
            font-size: 900%;
            text-decoration: solid underline;
            color: white;
        }


        button {
            height: 100px;
            width: 300px;
            margin: 10px;
            padding: 15px 30px;
            text-align: center;
            text-transform: uppercase;
            transition: 0.5s;
            background-size: 200% auto;
            color: white;
            border-radius: 10px;
            display: block;
            border: 0px;
            font-weight: 700;
            box-shadow: 0px 0px 14px -7px #f09819;
            background-image: linear-gradient(45deg, #FF512F 0%, #F09819 51%, #FF512F 100%);
            cursor: pointer;
            user-select: none;
            -webkit-user-select: none;
            touch-action: manipulation;
            font-size: 200%;
        }

        form {
            display: flex;
            align-items: center;
            justify-content: center;
            margin-top: 15%;
        }

        button:hover {
            background-position: right center;
            color: #fff;
            text-decoration: none;
        }

        button:active {
            transform: scale(0.95);
        }
    </style>
</Head>

<body>
    <main>
        <section>
            <h1>
                Johney Auguste Ami
            </h1>
        </section>

        <form action="/MainFolder/JohneysPortfolio.html">
            <button type="submit" value="Go to Portfolio">
                <label for="submit">Enter</label>
        </form>

    </main>
</body>

</html>
