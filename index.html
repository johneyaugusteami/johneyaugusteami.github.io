<!DOCTYPE html>
<html lang="EN">

<Head>
    <Title>Johney's Portfolio</Title>
    <meta http-equiv="Content-Type" content="text/html;charset=UTF-8">
    <meta name="description" content="Johney Auguste Ami's Portfolio Website Front Page">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Simonetta&display=swap" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Berkshire+Swash&display=swap" rel="stylesheet">

    <style>
        body {
            background-color: #333;
            background-image: url(https://images.hdqwalls.com/wallpapers/abstract-crystal-4k-e7.jpg);
            font-family: 'Berkshire Swash', cursive;
        }

        h1 {
            display: block;
            align-content: center;
            text-align: center;
            font-size: 900%;
            text-decoration: solid underline;
            background: -webkit-linear-gradient(90deg, #efd5ff 0%, #515ada 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: bold;
        }


        button {
            height: 100px;
            width: 300px;
            margin: 10px;
            padding: 15px 30px;
            text-align: center;
            text-transform: uppercase;
            transition: 0.5s;
            background-size: 200% auto;
            color: white;
            border-radius: 10px;
            display: block;
            border: 0px;
            font-weight: 700;
            box-shadow: 0px 0px 14px -7px #efd5ff;
            background-image: linear-gradient(90deg, #1CB5E0 0%, #000851 100%);
            cursor: pointer;
            user-select: none;
            -webkit-user-select: none;
            touch-action: manipulation;
            font-size: 200%;
        }

        form {
            display: flex;
            align-items: center;
            justify-content: center;
            margin-top: 8%;
        }

        button:hover {
            background-position: right center;
            color: #fff;
            text-decoration: none;
        }

        button:active {
            transform: scale(0.95);
        }
    </style>
</Head>

<body>
    <main>
        <section>
            <h1>
                Johney Auguste Ami
            </h1>
        </section>

        <form action="/MainFolder/JohneysPortfolio.html">
            <button type="submit" value="Go to Portfolio">
                <label for="submit">Enter</label>
        </form>

    </main>
</body>

</html>
