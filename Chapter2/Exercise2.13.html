<!DOCTYPE html>
<html lang="en">

<head>
    <title>Experimenting with the box model</title>

    <style type="text/css">
        /*The default value is "text/css", which indicates that the content is CSS.*/
        .box-1 {
            float: left;
            /*box will float to left of screen*/
            width: 200px;
            /* Width of box horizontally will be 200 pixels*/
            height: 200px;
            /* Height of box vertically will be 200 pixels*/
            padding: 50px;
            /* Defines space between the words and the border as 50 pixels*/
            border: 1px solid red;
            /*Defines the Border of the box (between the margin and padding as 1 pixel thick, solid and red in color) */
        }

        .box-2 {
            float: left;
            /*Box will float to left of screen*/
            width: 20%;
            /*width of box horizontally will be 20% of how wide it is capable of being */
            height: 20%;
            /*Height of box verticaly will be 20% of how high/low it is capable of being*/
            padding-top: 50px;
            /* Padding(distance) at top of box between the words & border is determined as 50 pixels vertically */
            margin-left: 10px;
            /* Margin(distance) from the outside of the border from other things on the left side.*/
            border: 5px solid green;
            /*Border of box will be 5 pixels thick, a green solid line */
        }

        .box-3 {
            float: left;
            /*Box will float to left of screen*/
            width: 300px;
            /*Width of box horizontally will be 300 pixels wide*/
            padding: 30px;
            /*Padding(distance) between words or elements inside box from the border*/
            margin: 50px;
            /*Margin(distance) from the outside of border and other things around box.*/
            border-top: 50px solid blue;
            /* Border of top of box will be 50 pixels thick, a solid blue line.*/
        }
    </style>

</head>

<body>

    <div class="box-1">Box 1</div>
    <div class="box-2">Box 2</div>
    <div class="box-3">Box 3</div>

</body>

</html>
