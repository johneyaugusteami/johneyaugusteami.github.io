<!DOCTYPE html>
<html lang="en">

<head>
    <title>Experimenting with the box model</title>

    <style type="text/css">
        /*The default value is "text/css", which indicates that the content is CSS.*/
        .box-1 {
            float: left;
            /*box will float to left of screen*/
            width: 200px;
            /* Width of box horizontally */
            height: 200px;
            /* Height of box vertically*/
            padding: 50px;
            /* Defines space between the words and the border as 50px*/
            border: 1px solid red;
            /*Defines the Border of the box (between the margin and padding as 1px in width, solid and red in color) */
        }
    </style>

</head>

<body>

    <div class="box-1">Box 1</div>
    <div class="box-2">Box 2</div>
    <div class="box-3">Box 3</div>

</body>

</html>
